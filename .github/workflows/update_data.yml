name: Daily ETF Data Update

on:
  schedule:
    - cron: '0 9 * * 1-5' # 每天週一至週五 UTC 9:00 (台灣時間 17:00) 執行
  workflow_dispatch:      # 允許手動執行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install httpx yfinance pandas

      - name: Run update script
        run: python update_etf.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp data.json docs/data.json
          git add data.json docs/data.json
          git commit -m "Auto-update ETF data.json [skip ci]" || echo "No changes to commit"
          git push
