<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開盤前5分鐘精準選股系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .phase-active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .phase-completed {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .phase-pending {
            background: #f3f4f6;
            color: #6b7280;
        }

        .stock-card {
            transition: all 0.3s ease;
        }

        .stock-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .countdown {
            font-family: 'Courier New', monospace;
            font-size: 3rem;
            color: #ef4444;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .confidence-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .confidence-high {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .confidence-medium {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .confidence-low {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }
    </style>
</head>

<body class="bg-gray-50">
    <!-- 頂部導航 -->
    <nav class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-stopwatch text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">開盤前5分鐘精準選股系統</h1>
                        <p class="text-sm opacity-90" id="current-time"></p>
                    </div>
                </div>
                <div>
                    <a href="/" class="px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-lg transition">
                        <i class="fas fa-home mr-2"></i>返回主頁
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 時間軸與倒數計時 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-bold mb-6 text-center">
                <i class="fas fa-clock mr-2 text-blue-600"></i>
                今日時間軸
            </h2>

            <!-- 倒數計時器 -->
            <div class="text-center mb-8 p-6 bg-gradient-to-r from-red-50 to-orange-50 rounded-lg">
                <p class="text-lg text-gray-600 mb-2">距離下一檢查點</p>
                <div class="countdown" id="countdown">--:--:--</div>
                <p class="text-sm text-gray-500 mt-2" id="next-checkpoint">計算中...</p>
            </div>

            <!-- 四大階段 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="phase-card phase-completed p-4 rounded-lg text-center">
                    <i class="fas fa-moon text-4xl mb-2"></i>
                    <h3 class="font-bold text-lg">前一晚</h3>
                    <p class="text-sm opacity-90">21:00-23:00</p>
                    <p class="text-xs mt-2">美股分析</p>
                </div>
                <div class="phase-card phase-active p-4 rounded-lg text-center">
                    <i class="fas fa-sunrise text-4xl mb-2"></i>
                    <h3 class="font-bold text-lg">當天早上</h3>
                    <p class="text-sm opacity-90">08:00-08:55</p>
                    <p class="text-xs mt-2">盤前掃描</p>
                </div>
                <div class="phase-card phase-pending p-4 rounded-lg text-center">
                    <i class="fas fa-fire text-4xl mb-2"></i>
                    <h3 class="font-bold text-lg">開盤前5分鐘</h3>
                    <p class="text-sm opacity-90">08:55-09:00</p>
                    <p class="text-xs mt-2">最終精選</p>
                </div>
                <div class="phase-card phase-pending p-4 rounded-lg text-center">
                    <i class="fas fa-rocket text-4xl mb-2"></i>
                    <h3 class="font-bold text-lg">開盤執行</h3>
                    <p class="text-sm opacity-90">09:00-09:05</p>
                    <p class="text-xs mt-2">即時判斷</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左側：最終精選 Top 5 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 監控清單精選分析 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-2xl font-bold mb-4 flex items-center justify-between">
                        <span>
                            <i class="fas fa-trophy mr-2 text-yellow-500"></i>
                            🏆 監控清單精選分析
                        </span>
                        <span class="text-sm font-normal text-gray-500">
                            共 <span id="total-count" class="font-bold text-blue-600">0</span> 支股票
                        </span>
                    </h2>
                    <div id="final-picks" class="space-y-3">
                        <p class="text-gray-500 text-center py-8">載入中...</p>
                    </div>
                </div>

                <!-- 市場預測 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-2xl font-bold mb-4 flex items-center">
                        <i class="fas fa-chart-line mr-2 text-green-600"></i>
                        市場整體預測
                    </h2>
                    <div id="market-prediction">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>

                <!-- 監控清單分析 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-2xl font-bold mb-4 flex items-center">
                        <i class="fas fa-list-check mr-2 text-purple-600"></i>
                        監控清單分析
                    </h2>
                    <div id="watchlist-analysis" class="max-h-96 overflow-y-auto">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>
            </div>

            <!-- 右側：檢查清單與分析 -->
            <div class="space-y-6">
                <!-- 檢查清單 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i class="fas fa-tasks mr-2 text-blue-600"></i>
                        檢查清單
                    </h2>
                    <div id="checklist" class="space-y-2">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>

                <!-- 美股影響 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i class="fas fa-flag-usa mr-2 text-red-600"></i>
                        美股影響分析
                    </h2>
                    <div id="us-market" class="space-y-3">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>

                <!-- 法人動向 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i class="fas fa-users mr-2 text-blue-600"></i>
                        💼 法人買賣超分析
                    </h2>
                    <div id="institutional-flow" class="space-y-2">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>

                <!-- 勝率統計 -->
                <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i class="fas fa-chart-bar mr-2 text-indigo-600"></i>
                        系統勝率統計
                    </h2>
                    <div id="statistics" class="space-y-3">
                        <p class="text-gray-500 text-center py-4">載入中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 基礎 URL
        const API_BASE = 'http://127.0.0.1:8000/api';

        // 更新當前時間
        function updateCurrentTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                weekday: 'short',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        setInterval(updateCurrentTime, 1000);
        updateCurrentTime();

        // 倒數計時
        function updateCountdown() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTime = currentHour * 60 + currentMinute;

            let targetTime, targetLabel, isNextDay = false;

            // 台股交易時間判斷
            if (currentHour >= 9 && currentHour < 14) {
                // 09:00-13:30 交易中
                if (currentHour == 13 && currentMinute > 30) {
                    // 13:30後，等待明天
                    targetTime = 21 * 60;  // 今晚 21:00
                    targetLabel = "今晚 21:00 - 開始隔夜分析";
                } else {
                    document.getElementById('countdown').textContent = "交易中";
                    document.getElementById('next-checkpoint').textContent = "台股交易時間 09:00-13:30";
                    return;
                }
            } else if (currentHour >= 21 || currentHour < 8) {
                // 21:00-08:00 隔夜分析到早盤掃描
                if (currentHour >= 21) {
                    // 21:00-23:59
                    targetTime = (24 * 60) + (8 * 60);  // 明天 08:00
                    targetLabel = "明早 08:00 - 開始早盤掃描";
                    isNextDay = true;
                } else {
                    // 00:00-07:59
                    targetTime = 8 * 60;  // 今天 08:00
                    targetLabel = "今早 08:00 - 開始早盤掃描";
                }
            } else if (currentHour == 8) {
                // 08:00-08:59
                if (currentMinute < 45) {
                    targetTime = 8 * 60 + 45;  // 08:45
                    targetLabel = "08:45 - 台指期開盤";
                } else if (currentMinute < 55) {
                    targetTime = 8 * 60 + 55;  // 08:55
                    targetLabel = "08:55 - 最終5分鐘精選";
                } else {
                    targetTime = 9 * 60;  // 09:00
                    targetLabel = "09:00 - 台股開盤";
                }
            } else {
                // 14:00-20:59 盤後時間
                targetTime = 21 * 60;  // 今晚 21:00
                targetLabel = "今晚 21:00 - 開始隔夜分析";
            }

            // 計算倒數時間
            let minutesLeft;
            if (isNextDay) {
                minutesLeft = targetTime - currentTime;
            } else {
                minutesLeft = targetTime - currentTime;
                if (minutesLeft < 0) minutesLeft += 24 * 60;
            }

            const hours = Math.floor(minutesLeft / 60);
            const minutes = minutesLeft % 60;
            const seconds = 60 - now.getSeconds();

            document.getElementById('countdown').textContent =
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            document.getElementById('next-checkpoint').textContent = targetLabel;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 載入監控清單精選分析
        async function loadFinalSelection() {
            try {
                // 改用監控清單分析API
                const res = await fetch(`${API_BASE}/watchlist-analysis`);
                const data = await res.json();

                const container = document.getElementById('final-picks');

                if (!data.analyzed_stocks || data.analyzed_stocks.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-8">監控清單為空</p>';
                    return;
                }

                // 更新總數顯示
                document.getElementById('total-count').textContent = data.analyzed_stocks.length;

                // 顯示所有股票，每張卡片可單獨展開
                renderAccordionStocks(data.analyzed_stocks);

            } catch (error) {
                console.error('載入最終精選失敗:', error);
            }
        }

        // 渲染可折疊的股票卡片
        function renderAccordionStocks(stocks) {
            const container = document.getElementById('final-picks');

            container.innerHTML = stocks.map((pick, index) => {
                const confidenceClass = pick.confidence >= 0.9 ? 'confidence-high' :
                    pick.confidence >= 0.75 ? 'confidence-medium' : 'confidence-low';

                const profitPercent = ((pick.target_price - pick.entry_price) / pick.entry_price * 100).toFixed(2);
                const lossPercent = ((pick.stop_loss - pick.entry_price) / pick.entry_price * 100).toFixed(2);

                return `
                    <div class="stock-accordion border-2 border-gray-200 rounded-lg overflow-hidden ${pick.rank === 1 ? 'border-yellow-400' : ''}">
                        <!-- 卡片標題 (始終顯示) -->
                        <div class="stock-header p-4 ${pick.rank === 1 ? 'bg-yellow-50' : 'bg-gray-50'} cursor-pointer hover:bg-opacity-80 transition-all" 
                             onclick="toggleStock(${index})">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl font-bold ${pick.rank === 1 ? 'text-yellow-600' : 'text-gray-800'}">
                                        ${pick.rank === 1 ? '🥇' : pick.rank === 2 ? '🥈' : pick.rank === 3 ? '🥉' : '#' + pick.rank}
                                    </span>
                                    <div>
                                        <div class="font-bold text-lg">${pick.stock_name} (${pick.stock_id})</div>
                                        <div class="text-sm text-gray-600">
                                            分數: <span class="font-semibold">${pick.total_score}</span> | 
                                            價格: <span class="font-semibold">${pick.current_price.toFixed(2)}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="confidence-badge ${confidenceClass}">
                                        ${(pick.confidence * 100).toFixed(0)}%
                                    </span>
                                    <i id="icon-${index}" class="fas fa-chevron-down text-gray-400 transition-transform"></i>
                                </div>
                            </div>
                        </div>

                        <!-- 卡片詳細內容 (可展開/收合) -->
                        <div id="content-${index}" class="stock-content hidden">
                            <div class="p-4 bg-white border-t border-gray-200">
                                <div class="mb-3">
                                    <p class="text-sm font-semibold text-gray-700 mb-2">📊 技術分析:</p>
                                    ${pick.reasons.map(r => `<p class="text-sm text-gray-600 ml-4">• ${r}</p>`).join('')}
                                </div>

                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div class="bg-blue-50 p-3 rounded-lg text-center">
                                        <p class="text-xs text-gray-600 mb-1">💰 進場價</p>
                                        <p class="font-bold text-blue-600 text-lg">${pick.entry_price.toFixed(2)}</p>
                                    </div>
                                    <div class="bg-green-50 p-3 rounded-lg text-center">
                                        <p class="text-xs text-gray-600 mb-1">🎯 目標價</p>
                                        <p class="font-bold text-green-600 text-lg">${pick.target_price.toFixed(2)}</p>
                                        <p class="text-xs text-green-600">+${profitPercent}%</p>
                                    </div>
                                    <div class="bg-red-50 p-3 rounded-lg text-center">
                                        <p class="text-xs text-gray-600 mb-1">🛑 停損價</p>
                                        <p class="font-bold text-red-600 text-lg">${pick.stop_loss.toFixed(2)}</p>
                                        <p class="text-xs text-red-600">${lossPercent}%</p>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-r from-purple-50 to-blue-50 p-3 rounded-lg">
                                    <p class="text-sm mb-1">
                                        <span class="font-semibold text-purple-700">📈 操作策略:</span> 
                                        <span class="text-gray-700">${pick.strategy}</span>
                                    </p>
                                    <p class="text-sm">
                                        <span class="font-semibold text-purple-700">💼 建議倉位:</span> 
                                        <span class="text-gray-700">${pick.position_size}</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 切換單個股票的展開/收合狀態
        function toggleStock(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);

            if (content.classList.contains('hidden')) {
                // 展開
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                // 收合
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        // 載入市場預測
        async function loadMarketPrediction() {
            try {
                const res = await fetch(`${API_BASE}/premarket/overnight-analysis`);
                const data = await res.json();

                const prediction = data.prediction;
                const container = document.getElementById('market-prediction');

                const sentimentIcon = prediction.overall_sentiment === 'bullish' ? '🚀' :
                    prediction.overall_sentiment === 'bearish' ? '📉' : '📊';

                const riskColor = prediction.risk_level === 'low' ? 'green' :
                    prediction.risk_level === 'medium' ? 'yellow' : 'red';

                container.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg">
                            <span class="font-semibold">開盤方向:</span>
                            <span class="text-xl font-bold text-blue-600">${sentimentIcon} ${prediction.opening_direction}</span>
                        </div>
                        
                        <div class="flex items-center justify-between p-3 bg-${riskColor}-50 rounded-lg">
                            <span class="font-semibold">風險等級:</span>
                            <span class="text-xl font-bold text-${riskColor}-600">${prediction.risk_level.toUpperCase()}</span>
                        </div>

                        <div class="bg-gray-50 p-3 rounded-lg">
                            <p class="font-semibold mb-2">關鍵因素:</p>
                            ${prediction.key_factors.map(f => `<p class="text-sm text-gray-700">• ${f}</p>`).join('')}
                        </div>

                        <div class="bg-purple-50 p-3 rounded-lg">
                            <p class="font-semibold">操作建議:</p>
                            <p class="text-sm mt-1">${prediction.recommended_action}</p>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('載入市場預測失敗:', error);
            }
        }

        // 載入監控清單分析
        async function loadWatchlistAnalysis() {
            try {
                // 從主控台獲取監控清單
                const res = await fetch('http://127.0.0.1:8082/api/stocks');
                const data = await res.json();

                // API 返回 {stocks: [...]}
                const stocks = data.stocks || data;

                const container = document.getElementById('watchlist-analysis');

                if (!stocks || stocks.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">監控清單為空</p>';
                    return;
                }

                container.innerHTML = `
                    <table class="w-full text-sm">
                        <thead class="bg-gradient-to-r from-purple-50 to-blue-50">
                            <tr>
                                <th class="p-3 text-left font-semibold text-gray-700">股票代號</th>
                                <th class="p-3 text-left font-semibold text-gray-700">股票名稱</th>
                                <th class="p-3 text-center font-semibold text-gray-700">狀態</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${stocks.map((stock, index) => `
                                <tr class="border-b hover:bg-purple-50 transition-colors">
                                    <td class="p-3">
                                        <span class="font-bold text-blue-600">${stock.code}</span>
                                    </td>
                                    <td class="p-3">
                                        <span class="text-gray-800">${stock.full_name || stock.name}</span>
                                    </td>
                                    <td class="p-3 text-center">
                                        <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">
                                            <i class="fas fa-eye mr-1"></i>監控中
                                        </span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="mt-4 text-center text-sm text-gray-500">
                        <i class="fas fa-info-circle mr-1"></i>
                        共 ${stocks.length} 支股票正在監控
                    </div>
                `;

            } catch (error) {
                console.error('載入監控清單失敗:', error);
                document.getElementById('watchlist-analysis').innerHTML =
                    '<p class="text-red-500 text-center py-4"><i class="fas fa-exclamation-triangle mr-2"></i>載入失敗，請確認主控台服務正常運行</p>';
            }
        }

        // 載入檢查清單
        async function loadChecklist() {
            try {
                const res = await fetch(`${API_BASE}/premarket/checklist`);
                const data = await res.json();

                const container = document.getElementById('checklist');

                if (!data.tasks || data.tasks.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">非工作時段</p>';
                    return;
                }

                container.innerHTML = data.tasks.map(task => `
                    <div class="flex items-center space-x-2 p-2 rounded ${task.done ? 'bg-green-50' : 'bg-gray-50'}">
                        <input type="checkbox" ${task.done ? 'checked' : ''} class="w-4 h-4 text-blue-600">
                        <span class="${task.done ? 'line-through text-gray-500' : 'text-gray-800'}">${task.task}</span>
                    </div>
                `).join('');

            } catch (error) {
                console.error('載入檢查清單失敗:', error);
            }
        }

        // 載入美股影響
        async function loadUSMarket() {
            try {
                const res = await fetch(`${API_BASE}/premarket/overnight-analysis`);
                const data = await res.json();

                const usMarket = data.us_market;
                const container = document.getElementById('us-market');

                container.innerHTML = `
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between p-2 bg-gray-50 rounded">
                            <span>那斯達克:</span>
                            <span class="font-bold ${usMarket.indicators.nasdaq > 0 ? 'text-green-600' : 'text-red-600'}">
                                ${usMarket.indicators.nasdaq > 0 ? '+' : ''}${usMarket.indicators.nasdaq}%
                            </span>
                        </div>
                        <div class="flex justify-between p-2 bg-gray-50 rounded">
                            <span>輝達 (NVDA):</span>
                            <span class="font-bold ${usMarket.indicators.nvidia > 0 ? 'text-green-600' : 'text-red-600'}">
                                ${usMarket.indicators.nvidia > 0 ? '+' : ''}${usMarket.indicators.nvidia}%
                            </span>
                        </div>
                        <div class="flex justify-between p-2 bg-gray-50 rounded">
                            <span>台指期夜盤:</span>
                            <span class="font-bold ${usMarket.indicators.taiwan_futures_night > 0 ? 'text-green-600' : 'text-red-600'}">
                                ${usMarket.indicators.taiwan_futures_night > 0 ? '+' : ''}${usMarket.indicators.taiwan_futures_night}點
                            </span>
                        </div>
                        <div class="bg-purple-50 p-2 rounded mt-3">
                            <p class="font-semibold">受惠類股:</p>
                            <p class="text-xs">${usMarket.focus_sectors.join(', ')}</p>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('載入美股分析失敗:', error);
            }
        }

        // 載入法人動向
        async function loadInstitutionalFlow() {
            try {
                const res = await fetch(`${API_BASE}/premarket/overnight-analysis`);
                const data = await res.json();

                const institutional = data.institutional;
                const container = document.getElementById('institutional-flow');

                if (institutional.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">暫無數據</p>';
                    return;
                }

                // 輔助函數：格式化買賣超數字 (台股慣例：紅漲綠跌)
                function formatNetBuy(value) {
                    const absValue = Math.abs(value);
                    const sign = value > 0 ? '+' : '';
                    const color = value > 0 ? 'text-red-600' : 'text-green-600';  // 台股：紅買綠賣
                    const label = value > 0 ? '買超' : '賣超';
                    return `<span class="font-semibold ${color}">${sign}${value}張 (${label})</span>`;
                }

                // 判斷法人一致方向
                function getConsensus(foreign, trust, dealer) {
                    const buyCount = [foreign, trust, dealer].filter(v => v > 0).length;
                    const sellCount = [foreign, trust, dealer].filter(v => v < 0).length;

                    if (buyCount === 3) return { text: '三大法人同步買超', color: 'bg-green-600', icon: '📈' };
                    if (sellCount === 3) return { text: '三大法人同步賣超', color: 'bg-red-600', icon: '📉' };
                    if (buyCount === 2) return { text: '二大法人買超', color: 'bg-green-500', icon: '↗️' };
                    if (sellCount === 2) return { text: '二大法人賣超', color: 'bg-red-500', icon: '↘️' };
                    return { text: '法人分歧', color: 'bg-yellow-500', icon: '⚠️' };
                }

                container.innerHTML = institutional.map(stock => {
                    const consensus = getConsensus(
                        stock.foreign_net_buy,
                        stock.trust_net_buy,
                        stock.dealer_net_buy
                    );

                    // 卡片背景顏色
                    const bgColor = consensus.color.includes('green') ? 'bg-green-50' :
                        consensus.color.includes('red') ? 'bg-red-50' : 'bg-yellow-50';

                    return `
                    <div class="p-3 ${bgColor} rounded-lg border-l-4 ${consensus.color.replace('bg-', 'border-')}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold">${stock.stock_name} (${stock.stock_id})</span>
                            <span class="text-xs ${consensus.color} text-white px-2 py-1 rounded">
                                ${consensus.icon} ${consensus.text}
                            </span>
                        </div>
                        <div class="text-xs space-y-1">
                            <div class="flex justify-between">
                                <span>外資:</span>
                                ${formatNetBuy(stock.foreign_net_buy)}
                            </div>
                            <div class="flex justify-between">
                                <span>投信:</span>
                                ${formatNetBuy(stock.trust_net_buy)}
                            </div>
                            <div class="flex justify-between">
                                <span>自營:</span>
                                ${formatNetBuy(stock.dealer_net_buy)}
                            </div>
                            <div class="flex justify-between pt-1 border-t border-gray-200">
                                <span class="font-semibold">合計:</span>
                                ${formatNetBuy(stock.foreign_net_buy + stock.trust_net_buy + stock.dealer_net_buy)}
                            </div>
                        </div>
                    </div>
                `;
                }).join('');

            } catch (error) {
                console.error('載入法人動向失敗:', error);
            }
        }

        // 載入統計
        async function loadStatistics() {
            try {
                const res = await fetch(`${API_BASE}/premarket/statistics`);
                const stats = await res.json();

                const container = document.getElementById('statistics');

                container.innerHTML = `
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between p-2 bg-white rounded">
                            <span>總交易次數:</span>
                            <span class="font-bold">${stats.total_trades}</span>
                        </div>
                        <div class="flex justify-between p-2 bg-white rounded">
                            <span>勝率:</span>
                            <span class="font-bold text-green-600">${(stats.win_rate * 100).toFixed(1)}%</span>
                        </div>
                        <div class="flex justify-between p-2 bg-white rounded">
                            <span>平均獲利:</span>
                            <span class="font-bold text-green-600">+${(stats.avg_profit * 100).toFixed(2)}%</span>
                        </div>
                        <div class="flex justify-between p-2 bg-white rounded">
                            <span>平均虧損:</span>
                            <span class="font-bold text-red-600">${(stats.avg_loss * 100).toFixed(2)}%</span>
                        </div>
                        <div class="flex justify-between p-2 bg-white rounded">
                            <span>期望值:</span>
                            <span class="font-bold text-blue-600">+${(stats.expected_value * 100).toFixed(2)}%</span>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('載入統計失敗:', error);
            }
        }

        // 初始化
        loadFinalSelection();
        loadMarketPrediction();
        loadWatchlistAnalysis();
        loadChecklist();
        loadUSMarket();
        loadInstitutionalFlow();
        loadStatistics();

        // 自動刷新
        setInterval(loadFinalSelection, 30000);  // 30秒
        setInterval(loadWatchlistAnalysis, 60000);  // 監控清單每分鐘更新
        setInterval(loadChecklist, 60000);  // 1分鐘
    </script>
</body>
