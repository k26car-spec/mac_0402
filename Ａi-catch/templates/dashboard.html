    <script>
        // 更新時間
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-TW');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 載入系統狀態
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                const statusDiv = document.getElementById('system-status');
                const statusText = document.getElementById('status-text');
                const tradingStatus = document.getElementById('trading-status');
                const todayAlerts = document.getElementById('today-alerts');
                const totalAlerts = document.getElementById('total-alerts');
                const lastCheck = document.getElementById('last-check');

                if (data.monitor_status === 'running') {
                    statusDiv.className = 'px-4 py-2 rounded-full text-sm font-bold status-running';
                    statusDiv.textContent = '系統運行中';
                    statusText.textContent = '運行中';
                    statusText.className = 'text-2xl font-bold text-green-600';
                } else {
                    statusDiv.className = 'px-4 py-2 rounded-full text-sm font-bold status-stopped';
                    statusDiv.textContent = '系統已停止';
                    statusText.textContent = '已停止';
                    statusText.className = 'text-2xl font-bold text-red-600';
                }

                if (data.is_trading_time) {
                    tradingStatus.textContent = '交易中';
                    tradingStatus.className = 'text-2xl font-bold text-green-600';
                } else {
                    tradingStatus.textContent = '休市';
                    tradingStatus.className = 'text-2xl font-bold text-red-600';
                }

                todayAlerts.textContent = data.today_alerts;
                totalAlerts.textContent = data.total_alerts;
                lastCheck.textContent = data.last_check;

            } catch (error) {
                console.error('載入狀態失敗:', error);
            }
        }

        // 載入股票清單
        async function loadStocks() {
            try {
                const res = await fetch('/api/stocks');
                const data = await res.json();

                document.getElementById('stock-count').textContent = data.stocks.length;

                const list = document.getElementById('stock-list');
                if (data.stocks.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 text-center py-4">暫無股票</p>';
                } else {
                    list.innerHTML = data.stocks.map(stock => {
                        const stockCode = stock.code || stock;
                        const stockName = stock.name || '';
                        const fullName = stock.full_name || stockCode;

                        return `
                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                            <div class="flex items-center flex-grow">
                                <i class="fas fa-chart-line text-blue-500 mr-3"></i>
                                <div>
                                    <span class="font-medium">${fullName}</span>
                                </div>
                            </div>
                            <button class="delete-btn px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition-colors"
                                    data-code="${stockCode}">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        `;
                    }).join('');

                    // 為所有刪除按鈕添加事件監聽
                    document.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function () {
                            const code = this.getAttribute('data-code');
                            removeStock(code);
                        });
                    });
                }
            } catch (error) {
                console.error('載入股票清單失敗:', error);
            }
        }

        // 載入警示
        async function loadAlerts() {
            try {
                const res = await fetch('/api/alerts/recent');
                const alerts = await res.json();

                const container = document.getElementById('alerts-container');
                if (alerts.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3"></i>
                            <p>暫無警示記錄</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = alerts.map(alert => {
                        const confidence = (alert.confidence * 100).toFixed(1);
                        const time = new Date(alert.timestamp).toLocaleString('zh-TW');
                        const borderColor = confidence >= 80 ? 'border-red-500' :
                            confidence >= 60 ? 'border-yellow-500' : 'border-green-500';

                        return `
                            <div class="alert-card border-l-4 ${borderColor} bg-gray-50 p-4 rounded-r-lg shadow-sm">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="font-bold text-lg">${alert.stock_code}</span>
                                    <span class="text-xs text-gray-500">${time}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-600 text-sm">信心指數</span>
                                    <span class="font-bold text-xl">${confidence}%</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('載入警示失敗:', error);
            }
        }

        // 控制函數
        async function startMonitor() {
            console.log('啟動按鈕被點擊');

            if (!confirm('確定要啟動監控系統嗎？\n\n系統將開始監控股票並偵測主力進場。')) {
                console.log('用戶取消啟動');
                return;
            }

            console.log('準備啟動監控系統...');

            try {
                console.log('發送 POST 請求到 /api/monitor/start');
                const res = await fetch('/api/monitor/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                console.log('收到響應:', res.status);
                const data = await res.json();
                console.log('響應數據:', data);

                // 顯示結果
                if (data.success) {
                    alert('✅ ' + data.message + '\n\n系統已開始監控。');
                    await loadStatus();
                } else {
                    alert('⚠️  ' + data.message);
                }
            } catch (error) {
                console.error('啟動失敗:', error);
                alert('❌ 啟動失敗：' + error.message + '\n\n請檢查 stock_monitor.py 是否存在。');
            }
        }

        async function stopMonitor() {
            console.log('停止按鈕被點擊');

            if (!confirm('確定要停止監控系統嗎？')) {
                console.log('用戶取消停止');
                return;
            }

            console.log('準備停止監控系統...');

            try {
                console.log('發送 POST 請求到 /api/monitor/stop');
                const res = await fetch('/api/monitor/stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                console.log('收到響應:', res.status);
                const data = await res.json();
                console.log('響應數據:', data);

                // 顯示結果
                if (data.success) {
                    alert('✅ ' + data.message);
                    await loadStatus();
                } else {
                    alert('⚠️  ' + data.message);
                }
            } catch (error) {
                console.error('停止失敗:', error);
                alert('❌ 停止失敗：' + error.message);
            }
        }

        // 刪除股票（簡化版）
        async function removeStock(stockCode) {
            console.log('刪除:', stockCode);

            try {
                const res = await fetch('/api/stocks/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_code: stockCode })
                });

                const data = await res.json();

                if (data.success) {
                    loadStocks();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('刪除失敗');
            }
        }

        let searchTimeout = null;  // 防抖計時器

        // 🔍 智能搜尋股票（雙層策略）
        async function searchStock(event) {
            const input = event.target;
            const query = input.value.trim();
            const resultsDiv = document.getElementById('search-results');

            // 如果輸入為空，隱藏結果
            if (!query) {
                resultsDiv.classList.add('hidden');
                return;
            }

            // ⏱️ 防抖機制：延遲 300ms
            clearTimeout(searchTimeout);

            searchTimeout = setTimeout(async () => {
                console.log('🔍 搜尋:', query);

                // 顯示載入中
                resultsDiv.innerHTML = `
                    <div class="px-4 py-3 text-gray-500 text-center">
                        <i class="fas fa-spinner fa-spin mr-2"></i>
                        搜尋中...
                    </div>
                `;
                resultsDiv.classList.remove('hidden');

                let results = [];

                // 1️⃣ 第一層：本地資料庫 (最快、最可靠)
                const localResults = searchLocalDatabase(query);
                if (localResults.length > 0) {
                    results = localResults;
                    console.log('📦 本地資料庫命中:', results.length, '筆');
                }

                // 2️⃣ 第二層：如果本地沒有結果，嘗試 Yahoo Finance API
                if (results.length === 0) {
                    try {
                        console.log('🌐 嘗試 Yahoo API...');
                        const yahooResults = await searchYahooFinance(query);
                        if (yahooResults && yahooResults.length > 0) {
                            results = yahooResults;
                            console.log('✅ Yahoo 搜尋成功:', results.length, '筆');
                        }
                    } catch (error) {
                        console.warn('⚠️ Yahoo 搜尋失敗 (CORS 限制):', error.message);
                    }
                }

                // 3️⃣ 如果還是沒有，嘗試直接用代碼添加
                if (results.length === 0 && /^\d{4,5}$/.test(query)) {
                    // 純數字代碼，讓用戶可以直接添加
                    results = [{
                        code: query,
                        name: `股票 ${query}`,
                        fullCode: query + '.TW',
                        source: 'manual'
                    }];
                    console.log('📝 允許手動添加:', query);
                }

                // 顯示結果
                displaySearchResults(results, resultsDiv);

            }, 300);  // 300ms 防抖
        }

        // 🌐 Yahoo Finance 即時搜尋
        async function searchYahooFinance(query) {
            const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&lang=zh-Hant-TW&region=TW&quotesCount=10`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);  // 3秒超時

                const response = await fetch(url, {
                    signal: controller.signal,
                    headers: {
                        'User-Agent': 'Mozilla/5.0'
                    }
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // 過濾台股（.TW 或 .TWO）
                const quotes = data.quotes || [];
                return quotes
                    .filter(quote => {
                        const symbol = quote.symbol || '';
                        return symbol.endsWith('.TW') || symbol.endsWith('.TWO');
                    })
                    .map(quote => ({
                        code: quote.symbol.replace(/\.(TW|TWO)$/, ''),
                        name: quote.shortname || quote.longname || '未知',
                        fullCode: quote.symbol,
                        source: 'yahoo'
                    }))
                    .slice(0, 10);  // 限制10筆

            } catch (error) {
                console.error('Yahoo 搜尋錯誤:', error.message);
                return [];
            }
        }

        // 💾 本地資料庫搜尋
        function searchLocalDatabase(query) {
            const normalizedQuery = query.toLowerCase();

            return COMMON_TW_STOCKS.filter(stock => {
                const codeMatch = stock.code.toLowerCase().includes(normalizedQuery);
                const nameMatch = stock.name.toLowerCase().includes(normalizedQuery);
                return codeMatch || nameMatch;
            }).map(stock => ({
                ...stock,
                source: 'local'
            }));
        }

        // 📊 顯示搜尋結果
        function displaySearchResults(results, resultsDiv) {
            if (results.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="px-4 py-3 text-gray-500 text-center">
                        找不到匹配的股票
                        <br>
                        <small class="text-xs">請輸入股票代碼或名稱（如：2330、台積電）</small>
                    </div>
                `;
                resultsDiv.classList.remove('hidden');
                return;
            }

            resultsDiv.innerHTML = results.map(stock => `
                <div class="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b last:border-0"
                     onclick="selectStock('${stock.fullCode}', '${stock.name}')">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="font-bold text-blue-600">${stock.code}</span>
                            <span class="text-gray-600 ml-2">${stock.name}</span>
                        </div>
                        <div class="text-xs text-gray-400">
                            ${stock.source === 'yahoo' ? '🌐 即時' : '💾 本地'}
                        </div>
                    </div>
                </div>
            `).join('');

            resultsDiv.classList.remove('hidden');
        }

        // ✅ 選擇股票
        function selectStock(code, name) {
            const input = document.getElementById('new-stock');
            input.value = code;
            document.getElementById('search-results').classList.add('hidden');

            // 自動添加
            addStock();
        }

        // 點擊外部關閉下拉選單
        document.addEventListener('click', function (e) {
            const searchInput = document.getElementById('new-stock');
            const resultsDiv = document.getElementById('search-results');
            if (e.target !== searchInput && !resultsDiv.contains(e.target)) {
                resultsDiv.classList.add('hidden');
            }
        });

        async function addStock() {
            const input = document.getElementById('new-stock');
            let stockCode = input.value.trim().toUpperCase();

            if (!stockCode) {
                alert('請輸入股票代號！');
                return;
            }

            // 🎯 智能補充後綴：純數字自動加 .TW
            if (/^\d+$/.test(stockCode)) {
                stockCode = stockCode + '.TW';
                console.log('✨ 自動補充後綴:', stockCode);
            }

            try {
                const res = await fetch('/api/stocks/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_code: stockCode })
                });
                const data = await res.json();

                if (data.success) {
                    alert(`✅ ${data.message}`);
                    input.value = '';
                    document.getElementById('search-results').classList.add('hidden');
                    loadStocks();
                } else {
                    alert(`⚠️ ${data.message}`);
                }
            } catch (error) {
                alert('❌ 添加失敗：' + error);
            }
        }

        async function removeStock(stockCode) {
            if (!confirm(`確定要移除 ${stockCode} 嗎？`)) return;

            try {
                const res = await fetch('/api/stocks/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_code: stockCode })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) loadStocks();
            } catch (error) {
                alert('移除失敗：' + error);
            }
        }

        async function testEmail() {
            if (confirm('確定要發送測試郵件嗎？')) {
                alert('請在終端機執行：./test_email_quick.sh');
            }
        }

        async function refreshAll() {
            await Promise.all([loadStatus(), loadStocks(), loadAlerts()]);
            alert('數據已更新！');
        }

        // 初始化
        loadStatus();
        loadStocks();
        loadAlerts();

        // 自動刷新
        setInterval(loadStatus, 5000);
        setInterval(loadAlerts, 10000);
    </script>
</body>
