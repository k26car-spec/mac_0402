<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSTM股票价格预测演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-between:
                align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title {
            font-size: 1.5em;
            color: #333;
            font-weight: 600;
        }

        .stock-symbol {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .prediction-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }

        .price {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        .confidence {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        .status.healthy {
            border-left: 4px solid #4caf50;
        }

        .status.error {
            border-left: 4px solid #f44336;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #856404;
        }

        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        .trend-up {
            color: #4caf50;
        }

        .trend-down {
            color: #f44336;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🧠 LSTM股票价格预测</h1>
            <p>基于深度学习的智能预测系统</p>
        </div>

        <div id="predictions" class="grid">
            <!-- 预测卡片将动态插入这里 -->
        </div>

        <div id="status" class="status">
            <div class="spinner"></div>
            <p>正在连接API服务器...</p>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api/lstm';
        const SYMBOLS = ['2330', '2317', '2454'];

        // 检查API健康状态
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();

                const statusDiv = document.getElementById('status');
                if (data.status === 'healthy') {
                    statusDiv.className = 'status healthy';
                    statusDiv.innerHTML = `
                        <p>✅ API服务正常 | 可用模型: ${data.available_models.join(', ')}</p>
                    `;
                    return true;
                } else {
                    throw new Error('API状态异常');
                }
            } catch (error) {
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    <p>❌ 无法连接到API服务器</p>
                    <p style="font-size: 0.9em; margin-top: 10px;">
                        请确保运行: <code>./start_lstm_api.sh</code>
                    </p>
                `;
                return false;
            }
        }

        // 获取单个股票预测
        async function getPrediction(symbol) {
            try {
                const response = await fetch(`${API_BASE}/predict/${symbol}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error(`获取${symbol}预测失败:`, error);
                return null;
            }
        }

        // 创建预测卡片
        function createPredictionCard(data) {
            if (!data) return '';

            const trendClass = data.predicted_price > 0 ? 'trend-up' : 'trend-down';
            const trendIcon = data.predicted_price > 0 ? '📈' : '📉';

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">股票预测</div>
                        <div class="stock-symbol">${data.symbol}</div>
                    </div>
                    
                    <div class="prediction-box">
                        <div style="font-size: 0.9em; opacity: 0.9;">预测价格</div>
                        <div class="price ${trendClass}">
                            $${data.predicted_price.toFixed(2)} ${trendIcon}
                        </div>
                        <div class="confidence">
                            置信度: ${data.confidence.toFixed(1)}%
                        </div>
                    </div>

                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">模型版本</div>
                            <div class="metric-value" style="font-size: 0.9em;">
                                ${data.model_version}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">更新时间</div>
                            <div class="metric-value" style="font-size: 0.9em;">
                                ${new Date(data.timestamp).toLocaleTimeString('zh-CN')}
                            </div>
                        </div>
                    </div>

                    <div class="note">
                        💡 ${data.note}
                    </div>
                </div>
            `;
        }

        // 加载所有预测
        async function loadPredictions() {
            const isHealthy = await checkHealth();
            if (!isHealthy) return;

            const predictionsDiv = document.getElementById('predictions');
            predictionsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载预测中...</p></div>';

            const predictions = await Promise.all(
                SYMBOLS.map(symbol => getPrediction(symbol))
            );

            const cardsHTML = predictions
                .map(data => createPredictionCard(data))
                .join('');

            predictionsDiv.innerHTML = cardsHTML;

            // 更新时间戳
            document.getElementById('timestamp').textContent =
                `最后更新: ${new Date().toLocaleString('zh-CN')}`;
        }

        // 自动刷新
        function autoRefresh() {
            loadPredictions();
            setInterval(loadPredictions, 60000); // 每分钟刷新
        }

        // 页面加载时执行
        window.addEventListener('load', autoRefresh);
    </script>
</body>

</html>
