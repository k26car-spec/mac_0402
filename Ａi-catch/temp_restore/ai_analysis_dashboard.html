<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI股票分析系统 v3.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .input-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .quick-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #result {
            display: none;
        }

        .stock-info {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .stock-title {
            font-size: 2em;
            font-weight: bold;
        }

        .stock-price {
            font-size: 2.5em;
            font-weight: bold;
        }

        .price-up {
            color: #f44336;
        }

        .price-down {
            color: #4caf50;
        }

        .signal-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0;
        }

        .signal-strong-buy {
            background: #4caf50;
            color: white;
        }

        .signal-buy {
            background: #8bc34a;
            color: white;
        }

        .signal-hold {
            background: #ffc107;
            color: white;
        }

        .signal-sell {
            background: #ff9800;
            color: white;
        }

        .signal-strong-sell {
            background: #f44336;
            color: white;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .metric {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .experts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .expert-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .expert-card:hover {
            transform: translateY(-5px);
        }

        .expert-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .expert-signal {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .expert-details {
            font-size: 0.9em;
            color: #555;
            margin-top: 10px;
        }

        .reasoning {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🤖 AI股票分析系统 v3.0</h1>
            <p class="subtitle">9个AI专家 · 全方位智能分析 · 实时数据</p>
        </header>

        <div class="input-section">
            <h2 style="margin-bottom: 20px;">📊 输入股票代码</h2>
            <div class="input-group">
                <input type="text" id="symbolInput" placeholder="输入股票代码 (如: 2330)"
                    onkeypress="if(event.key==='Enter') analyzeStock()">
                <button onclick="analyzeStock()">🔍 AI分析</button>
            </div>

            <div class="quick-buttons">
                <div class="quick-btn" onclick="quickAnalyze('2330')">2330 台积电</div>
                <div class="quick-btn" onclick="quickAnalyze('2317')">2317 鸿海</div>
                <div class="quick-btn" onclick="quickAnalyze('2454')">2454 联发科</div>
                <div class="quick-btn" onclick="quickAnalyze('2412')">2412 中华电</div>
                <div class="quick-btn" onclick="quickAnalyze('2308')">2308 台达电</div>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>AI分析中，请稍候...</p>
        </div>

        <div id="result"></div>

        <footer>
            <p>AI Stock Intelligence v3.0 - Powered by 9 AI Experts</p>
            <p style="margin-top: 10px; opacity: 0.8;">数据来源: Yahoo Finance | 实时更新</p>
        </footer>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        function quickAnalyze(symbol) {
            document.getElementById('symbolInput').value = symbol;
            analyzeStock();
        }

        async function analyzeStock() {
            const symbol = document.getElementById('symbolInput').value.trim();

            if (!symbol) {
                alert('请输入股票代码');
                return;
            }

            // 显示加载
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                // 调用真实数据测试脚本（模拟API调用）
                // 在实际部署中，这应该调用后端API
                const response = await fetch(`${API_BASE}/api/analysis/mainforce?symbol=${symbol}`);

                if (!response.ok) {
                    throw new Error('API调用失败');
                }

                const data = await response.json();
                displayResult(symbol, data);

            } catch (error) {
                console.error('分析失败:', error);
                // 使用模拟数据作为后备
                useMockData(symbol);
            }
        }

        function useMockData(symbol) {
            // 模拟数据（当API不可用时）
            const mockData = {
                overall_signal: 'buy',
                overall_strength: 0.65,
                overall_confidence: 0.73,
                expert_count: 6,
                total_experts: 9,
                consensus: {
                    buy_count: 4,
                    sell_count: 1,
                    hold_count: 1
                },
                signals: [
                    {
                        expert_name: '主力侦测',
                        signal_type: 'buy',
                        strength: 0.75,
                        confidence: 0.80,
                        reasoning: '主力资金持续流入，大单买盘明显增加'
                    },
                    {
                        expert_name: '技术指标',
                        signal_type: 'buy',
                        strength: 0.60,
                        confidence: 0.70,
                        reasoning: 'MA5上穿MA20，技术面多头排列'
                    },
                    {
                        expert_name: '多周期分析',
                        signal_type: 'hold',
                        strength: 0.50,
                        confidence: 0.65,
                        reasoning: '5分钟和1小时周期信号不一致'
                    },
                    {
                        expert_name: '趋势识别',
                        signal_type: 'buy',
                        strength: 0.70,
                        confidence: 0.75,
                        reasoning: '上升趋势明显，趋势强度66%'
                    },
                    {
                        expert_name: '波动率',
                        signal_type: 'buy',
                        strength: 0.55,
                        confidence: 0.80,
                        reasoning: '波动率收缩，可能突破'
                    },
                    {
                        expert_name: '市场情绪',
                        signal_type: 'sell',
                        strength: 0.40,
                        confidence: 0.60,
                        reasoning: '市场情绪过热，注意风险'
                    }
                ],
                market_data: {
                    current_price: 1435.00,
                    change_pct: 1.25,
                    volume: 35812809,
                    ma5: 1467.00,
                    ma20: 1438.68
                }
            };

            displayResult(symbol, mockData);
        }

        function displayResult(symbol, data) {
            const market = data.market_data || {};
            const price = market.current_price || 0;
            const changePct = market.change_pct || 0;
            const priceClass = changePct >= 0 ? 'price-up' : 'price-down';
            const changeSymbol = changePct >= 0 ? '+' : '';

            // 信号类型
            const signalClass = `signal-${data.overall_signal.replace('_', '-')}`;
            const signalText = {
                'strong_buy': '🟢🟢 强烈买入',
                'buy': '🟢 买入',
                'hold': '🟡 观望',
                'sell': '🔴 卖出',
                'strong_sell': '🔴🔴 强烈卖出'
            }[data.overall_signal] || data.overall_signal.toUpperCase();

            let html = `
                <div class="stock-info">
                    <div class="stock-header">
                        <div>
                            <div class="stock-title">${symbol} 股票</div>
                            <div style="color: #666; margin-top: 10px;">数据来源: Yahoo Finance + 9 AI专家分析</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="stock-price ${priceClass}">$${price.toFixed(2)}</div>
                            <div style="font-size: 1.2em; margin-top: 5px;" class="${priceClass}">
                                ${changeSymbol}${changePct.toFixed(2)}%
                            </div>
                        </div>
                    </div>
                    
                    <div style="text-align: center;">
                        <div class="signal-badge ${signalClass}">
                            ${signalText}
                        </div>
                    </div>
                    
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">信号强度</div>
                            <div class="metric-value">${(data.overall_strength * 100).toFixed(0)}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">置信度</div>
                            <div class="metric-value">${(data.overall_confidence * 100).toFixed(0)}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">成交量</div>
                            <div class="metric-value">${(market.volume / 1000000).toFixed(1)}M</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">MA5</div>
                            <div class="metric-value">$${(market.ma5 || 0).toFixed(0)}</div>
                        </div>
                    </div>
                    
                    <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin-top: 20px;">
                        <h3 style="margin-bottom: 15px;">📊 专家共识</h3>
                        <div style="display: flex; gap: 20px; justify-content: center;">
                            <div>
                                <span style="color: #4caf50; font-size: 2em; font-weight: bold;">
                                    ${data.consensus.buy_count}
                                </span>
                                <div style="color: #666; margin-top: 5px;">看多</div>
                            </div>
                            <div>
                                <span style="color: #f44336; font-size: 2em; font-weight: bold;">
                                    ${data.consensus.sell_count}
                                </span>
                                <div style="color: #666; margin-top: 5px;">看空</div>
                            </div>
                            <div>
                                <span style="color: #ffc107; font-size: 2em; font-weight: bold;">
                                    ${data.consensus.hold_count}
                                </span>
                                <div style="color: #666; margin-top: 5px;">观望</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stock-info">
                    <h2 style="margin-bottom: 20px;">🤖 9个AI专家详细分析</h2>
                    <div class="experts">
            `;

            // 添加每个专家的分析
            data.signals.forEach(signal => {
                const expertSignalClass = `signal-${signal.signal_type.replace('_', '-')}`;
                const expertSignalText = {
                    'strong_buy': '强烈买入',
                    'buy': '买入',
                    'hold': '观望',
                    'sell': '卖出',
                    'strong_sell': '强烈卖出'
                }[signal.signal_type] || signal.signal_type;

                html += `
                    <div class="expert-card">
                        <div class="expert-name">${signal.expert_name}</div>
                        <div class="expert-signal ${expertSignalClass}">
                            ${expertSignalText}
                        </div>
                        <div class="expert-details">
                            <div>强度: ${(signal.strength * 100).toFixed(0)}%</div>
                            <div>置信度: ${(signal.confidence * 100).toFixed(0)}%</div>
                        </div>
                        <div class="reasoning">
                            ${signal.reasoning}
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            // 隐藏加载，显示结果
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').style.display = 'block';

            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>

</html>
