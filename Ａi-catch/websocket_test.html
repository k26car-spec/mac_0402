<!DOCTYPE html>
<html>

<head>
    <title>WebSocket Test</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #0f3;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .connected {
            background: #0d4;
            color: #000;
        }

        .disconnected {
            background: #d40;
            color: #fff;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background: #0f3;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0d4;
        }

        .result {
            background: #2a2a4e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .signal {
            font-size: 24px;
            font-weight: bold;
        }

        .buy {
            color: #0f3;
        }

        .sell {
            color: #f30;
        }

        .hold {
            color: #fa0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 WebSocket Real-time Analysis</h1>

        <div id="status" class="status disconnected">❌ 未连接</div>

        <div>
            <button onclick="connect()">连接</button>
            <button onclick="disconnect()">断开</button>
            <button onclick="subscribe('2330')">订阅2330</button>
            <button onclick="subscribe('2317')">订阅2317</button>
        </div>

        <div id="result" class="result">等待数据...</div>
    </div>

    <script>
        let ws = null;

        function connect() {
            ws = new WebSocket('ws://localhost:8000/ws');

            ws.onopen = () => {
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = '✅ 已连接';
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Received:', data);

                if (data.type === 'analysis') {
                    displayAnalysis(data.data);
                } else if (data.type === 'connected') {
                    console.log(data.message);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = '❌ 未连接';
                console.log('WebSocket disconnected');
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function subscribe(symbol) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('请先连接WebSocket');
                return;
            }

            ws.send(JSON.stringify({
                action: 'subscribe',
                symbol: symbol
            }));
        }

        function displayAnalysis(data) {
            const signalClass = data.signal.includes('buy') ? 'buy' :
                data.signal.includes('sell') ? 'sell' : 'hold';

            const html = `
                <h3>${data.symbol}</h3>
                <div>价格: $${data.price.toFixed(2)} (${(data.change * 100).toFixed(2)}%)</div>
                <div>成交量: ${data.volume.toLocaleString()}</div>
                <div class="signal ${signalClass}">
                    信号: ${data.signal.toUpperCase()}
                </div>
                <div>强度: ${(data.strength * 100).toFixed(2)}%</div>
                <div>置信度: ${(data.confidence * 100).toFixed(2)}%</div>
                <div>专家数: ${data.expert_count}</div>
                <div style="margin-top: 10px; font-size: 12px; color: #888;">
                    ${data.timestamp}
                </div>
            `;

            document.getElementById('result').innerHTML = html;
        }

        // 自动连接
        setTimeout(connect, 500);
    </script>
</body>

</html>
