<script>
	// 將字串轉為 hex 格式, eg. &#xHH
	function toHex_js(str) {
		var result = "";
		if (typeof (str) !== 'string') return '';

		for (var i = 0; i < str.length; i++) {
			var partial = str.charCodeAt(i).toString(16);

			while (partial.length !== 4)
				partial = "0" + partial;
			result += partial;
		}
		return result;
	}

	// 切選 券商公司List

		//console.log(sUrl);

	}

	// 切選 張數 或 金額
	function goChg(sKind) {
		var sUrl = '/z/zg/zgb/zgb0.djhtm?';

		var sFrmObj = document.frm;
		var sA = sFrmObj.sel_Broker.options[sFrmObj.sel_Broker.selectedIndex].value;
		var sB = sFrmObj.sel_BrokerBranch.options[sFrmObj.sel_BrokerBranch.selectedIndex].value;
			//sB = toHex_js(sB);

		var sDay = sFrmObj.S1.options[sFrmObj.S1.selectedIndex].value;

		var sDate = sFrmObj.Y2.options[sFrmObj.Y2.selectedIndex].value + '-'; 	//起始日期
		sDate = sDate + sFrmObj.M2.options[sFrmObj.M2.selectedIndex].value + '-';
		sDate = sDate + sFrmObj.D2.options[sFrmObj.D2.selectedIndex].value;

		var eDate = sFrmObj.Y1.options[sFrmObj.Y1.selectedIndex].value + '-'; 	//結束日期
		eDate = eDate + sFrmObj.M1.options[sFrmObj.M1.selectedIndex].value + '-';
		eDate = eDate + sFrmObj.D1.options[sFrmObj.D1.selectedIndex].value;	// 結束日期

		if (sDay != '0') {
			sUrl = sUrl + 'a=' + sA + '&b=' + sB + '&c=' + sKind + '&d=' + sDay;
		}
		else {
			sUrl = sUrl + 'a=' + sA + '&b=' + sB + '&c=' + sKind + '&e=' + sDate + '&f=' + eDate;
		}
		document.location.href = sUrl;
	}

	// 切選 近N 日 下拉選單
	function goChgDay() {
		var sUrl = '/z/zg/zgb/zgb0.djhtm?';

		var sFrmObj = document.frm;
		var sA = sFrmObj.sel_Broker.options[sFrmObj.sel_Broker.selectedIndex].value;
		var sB = sFrmObj.sel_BrokerBranch.options[sFrmObj.sel_BrokerBranch.selectedIndex].value;
			//sB = toHex_js(sB);

		var sDay = sFrmObj.S1.options[sFrmObj.S1.selectedIndex].value;
		var sKind = $('input[name=R1]:checked').val();
		sUrl = sUrl + 'a=' + sA + '&b=' + sB + '&c=' + sKind + '&d=' + sDay;
		document.location.href = sUrl;
	}

	// 切選 起訖日期之 下拉選單
	function goChgYMD() {
		var sUrl = '/z/zg/zgb/zgb0.djhtm?';

		var sFrmObj = document.frm;

		if (CheckDate()) {
			var sA = sFrmObj.sel_Broker.options[sFrmObj.sel_Broker.selectedIndex].value;
			var sB = sFrmObj.sel_BrokerBranch.options[sFrmObj.sel_BrokerBranch.selectedIndex].value;
				//sB = toHex_js(sB);

			var sKind = $('input[name=R1]:checked').val();

			var sDate = sFrmObj.Y2.options[sFrmObj.Y2.selectedIndex].value + '-'; 	//起始日期
			sDate = sDate + sFrmObj.M2.options[sFrmObj.M2.selectedIndex].value + '-';
			sDate = sDate + sFrmObj.D2.options[sFrmObj.D2.selectedIndex].value;

			var eDate = sFrmObj.Y1.options[sFrmObj.Y1.selectedIndex].value + '-'; 	//結束日期
			eDate = eDate + sFrmObj.M1.options[sFrmObj.M1.selectedIndex].value + '-';
			eDate = eDate + sFrmObj.D1.options[sFrmObj.D1.selectedIndex].value; // 結束日期				

			sUrl = sUrl + 'a=' + sA + '&b=' + sB + '&c=' + sKind + '&e=' + sDate + '&f=' + eDate;

			document.location.href = sUrl;
		}
	}

	function CheckDate()
	{
		var Frm = document.frm;
		var y1 = parseInt(Frm.Y1.options[Frm.Y1.selectedIndex].value);
		var m1 = parseInt(Frm.M1.options[Frm.M1.selectedIndex].value);
		var d1 = parseInt(Frm.D1.options[Frm.D1.selectedIndex].value);
		var y2 = parseInt(Frm.Y2.options[Frm.Y2.selectedIndex].value);
		var m2 = parseInt(Frm.M2.options[Frm.M2.selectedIndex].value);
		var d2 = parseInt(Frm.D2.options[Frm.D2.selectedIndex].value);
		var sEDate = y1 + '-' + m1 + '-' + d1;
		var sBDate = y2 + '-' + m2 + '-' + d2;
		Frm.bDate.value = sBDate;
		Frm.eDate.value = sEDate;
		return checkBEdate(sBDate,sEDate);
	}
	function checkBEdate(sBDate,sEDate)
	{
		var aymd1 = sBDate.split(' ')[0].split('-');
		var aymd2 = sEDate.split(' ')[0].split('-');
		if (aymd1.length < 3 || aymd2.length < 3 ) {
			alert ('日期選擇錯誤!!');
			return false;
		}
		var nbdate = parseInt(aymd1[0])*1000000 + parseInt(aymd1[1])*10000 + parseInt(aymd1[2])*100;
		var nedate = parseInt(aymd2[0])*1000000 + parseInt(aymd2[1])*10000 + parseInt(aymd2[2])*100;
		if (nbdate > nedate) {
			alert('您所輸入的起始日期大於結束日期');
			return false;
		}
		return true;
	}
